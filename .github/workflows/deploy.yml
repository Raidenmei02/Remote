name: Docker Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/remote-control-bridge
  CONTAINER_NAME: remote-app
  DEPLOY_PORT: "8787"

jobs:
  build_and_push:
    name: Build And Push Image
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    needs: build_and_push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || '22' }}
          script: |
            set -e
            IMAGE="ghcr.io/raidenmei02/remote-control-bridge:latest"
            DATA_DIR="${{ secrets.DEPLOY_DATA_DIR || '/opt/remote-control/data' }}"
            RETRY_MAX=5
            RETRY_DELAY=2
            NON_RETRYABLE_PATTERNS='denied: denied|unauthorized|authentication required|invalid username|invalid password|insufficient_scope|requested access to the resource is denied|permission denied|forbidden'

            retry() {
              local max_attempts="$1"
              local base_delay="$2"
              shift 2

              local attempt=1
              while true; do
                local output
                if output=$("$@" 2>&1); then
                  [ -n "$output" ] && echo "$output"
                  return 0
                fi

                [ -n "$output" ] && echo "$output"

                if echo "$output" | grep -Eiq "$NON_RETRYABLE_PATTERNS"; then
                  echo "Non-retryable failure detected, stop retrying: $*"
                  return 1
                fi

                if [ "$attempt" -ge "$max_attempts" ]; then
                  echo "Command failed after ${attempt} attempts: $*"
                  return 1
                fi

                local sleep_seconds=$((base_delay * attempt))
                echo "Attempt ${attempt} failed, retrying in ${sleep_seconds}s: $*"
                sleep "$sleep_seconds"
                attempt=$((attempt + 1))
              done
            }

            mkdir -p "$DATA_DIR"

            retry "$RETRY_MAX" "$RETRY_DELAY" sh -c 'echo "${{ secrets.DOCKER_PASSWORD }}" | docker login ghcr.io -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin'
            retry "$RETRY_MAX" "$RETRY_DELAY" docker pull "$IMAGE"

            if docker ps -a --format '{{.Names}}' | grep -Eq '^remote-app$'; then
              docker stop remote-app || true
              docker rm remote-app || true
            fi

            docker run -d \
              --name remote-app \
              --restart unless-stopped \
              -p 8787:8787 \
              -v "$DATA_DIR:/app/data" \
              "$IMAGE"

            docker image prune -f
