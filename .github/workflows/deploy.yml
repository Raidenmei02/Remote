name: Docker Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/remote-control-bridge
  CONTAINER_NAME: remote-app
  DEPLOY_PORT: "8787"

jobs:
  build_and_push:
    name: Build And Push Image
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    needs: build_and_push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
          script: |
            set -e
            IMAGE="ghcr.io/${{ github.repository_owner }}/remote-control-bridge:latest"
            DATA_DIR="${{ secrets.DEPLOY_DATA_DIR || '/opt/remote-control/data' }}"

            mkdir -p "$DATA_DIR"

            echo "${{ secrets.DEPLOY_REGISTRY_TOKEN }}" | docker login ghcr.io -u "${{ secrets.DEPLOY_REGISTRY_USER }}" --password-stdin
            docker pull "$IMAGE"

            if docker ps -a --format '{{.Names}}' | grep -Eq '^remote-app$'; then
              docker stop remote-app || true
              docker rm remote-app || true
            fi

            docker run -d \
              --name remote-app \
              --restart unless-stopped \
              -p 8787:8787 \
              -v "$DATA_DIR:/app/data" \
              "$IMAGE"

            docker image prune -f
